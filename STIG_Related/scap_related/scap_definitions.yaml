oval:rhel.stig:def:1:
  Version: "1"
  Title: The RHEL 8 version is RHEL 8.2 or newer.
  Description: External definition used to determine if the RHEL 8 version is RHEL 8.2 or newer for version applicability based requirements.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: The RHEL 8 version is RHEL 8.2 or newer
        criterion_test: oval:rhel.stig:tst:1
oval:rhel.stig:def:10:
  Version: "1"
  Title: IPv6 is disabled in the kernel.
  Description: IPv6 is disabled in the kernel, either via a kernel cmdline option or sysctl.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: ipv6.disable=1 in the kernel cmdline
        criterion_test: oval:rhel.stig:tst:12
      - criteria:
          criteria_negate: ""
          criteria_operator: AND
          criterion:
          - criterion_comment: net.ipv6.conf.all.disable_ipv6 setting in kernel is 1
            criterion_test: oval:rhel.stig:tst:10
          - criterion_comment: net.ipv6.conf.all.disable_ipv6 setting in sysctl configuration files is set to 1, and nothing else
            criterion_test: oval:rhel.stig:tst:11
oval:rhel.stig:def:100:
  Version: "1"
  Title: RHEL must use a Linux Security Module configured to enforce limits on system services.
  Description: Without verification of the security functions, security functions may not operate correctly and the failure may go unnoticed. Security function is defined as the hardware, software, and/or firmware of the information system responsible for enforcing the system security policy and supporting the isolation of code and data on which the protection is based. Security functionality includes, but is not limited to, establishing system accounts, configuring access authorizations (i.e., permissions, privileges), setting events to be audited, and setting intrusion detection parameters.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: selinux enforcing mode
        criterion_test: oval:rhel.stig:tst:100
oval:rhel.stig:def:101:
  Version: "1"
  Title: RHEL-08-010171 - RHEL 8 must have the policycoreutils package installed.
  Description: |-
    Without verification of the security functions, security functions may not operate correctly and the failure may go unnoticed. Security function is defined as the hardware, software, and/or firmware of the information system responsible for enforcing the system security policy and supporting the isolation of code and data on which the protection is based. Security functionality includes, but is not limited to, establishing system accounts, configuring access authorizations (i.e., permissions, privileges), setting events to be audited, and setting intrusion detection parameters.

    Policycoreutils contains the policy core utilities that are required for basic operation of an SELinux-enabled system. These utilities include load_policy to load SELinux policies, setfile to label filesystems, newrole to switch roles, and run_init to run /etc/init.d scripts in the proper context.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: package policycoreutils is installed
        criterion_test: oval:rhel.stig:tst:101
oval:rhel.stig:def:102:
  Version: "1"
  Title: RHEL must enable the SELinux targeted policy.
  Description: |-
    Without verification of the security functions, security functions may not operate correctly and the failure may go unnoticed. Security function is defined as the hardware, software, and/or firmware of the information system responsible for enforcing the system security policy and supporting the isolation of code and data on which the protection is based. Security functionality includes, but is not limited to, establishing system accounts, configuring access authorizations (i.e., permissions, privileges), setting events to be audited, and setting intrusion detection parameters.

    This requirement applies to operating systems performing security function verification/testing and/or systems and environments that require this functionality.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:102
oval:rhel.stig:def:103:
  Version: "1"
  Title: RHEL-07-020900 - The Red Hat Enterprise Linux operating system must be configured so that all system device files are correctly labeled to prevent unauthorized modification.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: device_t in /dev
        criterion_test: oval:rhel.stig:tst:103
      - criterion_comment: unlabeled_t in /dev
        criterion_test: oval:rhel.stig:tst:104
oval:rhel.stig:def:106:
  Version: "1"
  Title: RHEL-07-020022 - The Red Hat Enterprise Linux operating system must not allow privileged accounts to utilize SSH.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ssh_sysadm_login is configured correctly
        criterion_test: oval:rhel.stig:tst:106
oval:rhel.stig:def:120:
  Version: "1"
  Title: RHEL must require users to provide a password for privilege escalation.
  Description: |-
    Without reauthentication, users may access resources or perform tasks for which they do not have authorization.

    When operating systems provide the capability to escalate a functional capability, it is critical the user reauthenticate.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: "'NOPASSWD' does not exist in /etc/sudoers"
        criterion_test: oval:rhel.stig:tst:120
      - criterion_comment: "'NOPASSWD' does not exist in /etc/sudoers.d"
        criterion_test: oval:rhel.stig:tst:121
oval:rhel.stig:def:122:
  Version: "1"
  Title: RHEL must require users to reauthenticate for privilege escalation.
  Description: |-
    Without reauthentication, users may access resources or perform tasks for which they do not have authorization.

    When operating systems provide the capability to escalate a functional capability, it is critical the user reauthenticate.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: "'!authenticate' does not exist in /etc/sudoers"
        criterion_test: oval:rhel.stig:tst:122
      - criterion_comment: "'!authenticate' does not exist in /etc/sudoers.d"
        criterion_test: oval:rhel.stig:tst:123
oval:rhel.stig:def:124:
  Version: "1"
  Title: RHEL must restrict privilege elevation to authorized personnel.
  Description: The sudo command allows a user to execute programs with elevated (administrator) privileges. It prompts the user for their password and confirms your request to execute a command by checking a file, called sudoers. If the "sudoers" file is not configured correctly, any user defined on the system can initiate privileged actions on the target system.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: ALL is not configured in /etc/sudoers
        criterion_test: oval:rhel.stig:tst:124
      - criterion_comment: ALL is not configured in /etc/sudoers.d
        criterion_test: oval:rhel.stig:tst:125
oval:rhel.stig:def:126:
  Version: "1"
  Title: RHEL must use the invoking user's password for privilege escalation when using "sudo".
  Description: |-
    The sudoers security policy requires that users authenticate themselves before they can use sudo. When sudoers requires authentication, it validates the invoking user's credentials. If the rootpw, targetpw, or runaspw flags are defined and not disabled, by default the operating system will prompt the invoking user for the "root" user password. 
    For more information on each of the listed configurations, reference the sudoers(5) manual page.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criteria:
          criteria_negate: ""
          criteria_operator: OR
          criterion:
          - criterion_comment: Defaults !targetpw is configured in /etc/sudoers
            criterion_test: oval:rhel.stig:tst:126
          - criterion_comment: Defaults !targetpw is configured in /etc/sudoers.d
            criterion_test: oval:rhel.stig:tst:127
      - criteria:
          criteria_negate: ""
          criteria_operator: OR
          criterion:
          - criterion_comment: Defaults !rootpw is configured in /etc/sudoers
            criterion_test: oval:rhel.stig:tst:128
          - criterion_comment: Defaults !rootpw is configured in /etc/sudoers.d
            criterion_test: oval:rhel.stig:tst:129
      - criteria:
          criteria_negate: ""
          criteria_operator: OR
          criterion:
          - criterion_comment: Defaults !runaspw is configured in /etc/sudoers
            criterion_test: oval:rhel.stig:tst:130
          - criterion_comment: Defaults !runaspw is configured in /etc/sudoers.d
            criterion_test: oval:rhel.stig:tst:131
oval:rhel.stig:def:132:
  Version: "1"
  Title: RHEL must require re-authentication when using the "sudo" command.
  Description: |-
    Without re-authentication, users may access resources or perform tasks for which they do not have authorization. 

    When operating systems provide the capability to escalate a functional capability, it is critical the organization requires the user to re-authenticate when using the "sudo" command.

    If the value is set to an integer less than 0, the user's time stamp will not expire and the user will not have to re-authenticate for privileged actions until the user's session is terminated.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:132
oval:rhel.stig:def:135:
  Version: "1"
  Title: RHEL must specify the default include directory for the /etc/sudoers file.
  Description: The "sudo" command allows authorized users to run programs (including shells) as other users, system users, and root. The "/etc/sudoers" file is used to configure authorized "sudo" users as well as the programs they are allowed to run. Some configuration options in the "/etc/sudoers" file allow configured users to run programs without re-authenticating. Use of these configuration options makes it easier for one compromised account to be used to compromise other accounts.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criteria:
          criteria_negate: ""
          criteria_operator: AND
          criterion:
          - criterion_comment: "Check /etc/sudoers doesn't have any #include"
            criterion_test: oval:rhel.stig:tst:136
          - criterion_comment: "Check /etc/sudoers doesn't have any #includedir"
            criterion_test: oval:rhel.stig:tst:137
      - criteria:
          criteria_negate: ""
          criteria_operator: AND
          criterion:
          - criterion_comment: 'Check /etc/sudoers for #includedir'
            criterion_test: oval:rhel.stig:tst:135
          - criterion_comment: "Check /etc/sudoers doesn't have any #include"
            criterion_test: oval:rhel.stig:tst:136
          - criterion_comment: "Check /etc/sudoers.d doesn't have any #include or #includedir"
            criterion_test: oval:rhel.stig:tst:138
oval:rhel.stig:def:139:
  Version: "1"
  Title: RHEL-07-020023 - The Red Hat Enterprise Linux operating system must elevate the SELinux context when an administrator calls the sudo command.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: /etc/sudoers test
        criterion_test: oval:rhel.stig:tst:139
      - criterion_comment: /etc/sudoers.d/ test
        criterion_test: oval:rhel.stig:tst:140
oval:rhel.stig:def:160:
  Version: "1"
  Title: RHEL-08-010372 - RHEL 8 must prevent the loading of a new kernel for later execution.
  Description: |-
    Changes to any software components can have significant effects on the overall security of the operating system. This requirement ensures the software has not been tampered with and that it has been provided by a trusted vendor.

    Disabling kexec_load prevents an unsigned kernel image (that could be a windows kernel or modified vulnerable kernel) from being loaded. Kexec can be used subvert the entire secureboot process and should be avoided at all costs especially since it can load unsigned kernel images.

    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf
    /usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: kernel.kexec_load_disabled setting in kernel is 1
        criterion_test: oval:rhel.stig:tst:160
      - criterion_comment: kernel.kexec_load_disabled setting in sysctl configuration files is set to 1, and nothing else
        criterion_test: oval:rhel.stig:tst:161
oval:rhel.stig:def:162:
  Version: "1"
  Title: RHEL-08-010373 - RHEL 8 must enable kernel parameters to enforce discretionary access control on symlinks.
  Description: |-
    Discretionary Access Control (DAC) is based on the notion that individual users are "owners" of objects and therefore have discretion over who should be authorized to access the object and in which mode (e.g., read or write).  Ownership is usually acquired as a consequence of creating the object or via specified ownership assignment.  DAC allows the owner to determine who will have access to objects they control.  An example of DAC includes user-controlled file permissions.  

    When discretionary access control policies are implemented, subjects are not constrained with regard to what actions they can take with information for which they have already been granted access.  Thus, subjects that have been granted access to information are not prevented from passing (i.e., the subjects have the discretion to pass) the information to other subjects or objects.  A subject that is constrained in its operation by Mandatory Access Control policies is still able to operate under the less rigorous constraints of this requirement.  Thus, while Mandatory Access Control imposes constraints preventing a subject from passing information to another subject operating at a different sensitivity level, this requirement permits the subject to pass the information to any subject at the same sensitivity level.  The policy is bounded by the information system boundary.  Once the information is passed outside the control of the information system, additional means may be required to ensure the constraints remain in effect.  While the older, more traditional definitions of discretionary access control require identity-based access control, that limitation is not required for this use of discretionary access control.  

    By enabling the fs.protected_symlinks kernel parameter, symbolic links are permitted to be followed only when outside a sticky world-writable directory, or when the UID of the link and follower match, or when the directory owner matches the symlink's owner.  Disallowing such symlinks helps mitigate vulnerabilities based on insecure file system accessed by privileged programs, avoiding an exploitation vector exploiting unsafe use of open() or creat().  

    The sysctl --system command will load settings from all system configuration files.  All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in.  If multiple files specify the same option, the entry in the file with lexicographically latest name will take precedence.  Files are read from directories in the following list from top to bottom.  Once a file of a gien filename is loaded, any file of the same name in subsequent directories is ignored.  
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf/usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: fs.protected_symlinks setting in kernel is 1
        criterion_test: oval:rhel.stig:tst:162
      - criterion_comment: fs.protected_symlinks setting in sysctl configuration files is set to 1, and nothing else, and there are no conflicting settings in other files
        criterion_test: oval:rhel.stig:tst:163
oval:rhel.stig:def:164:
  Version: "1"
  Title: RHEL-08-010374 - RHEL 8 must enable kernel parameters to enforce discretionary access control on hardlinks.
  Description: |-
    Discretionary Access Control (DAC) is based on the notion that individual users are "owners" of objects and therefore have discretion over who should be authorized to access the object and in which mode (e.g., read or write). Ownership is usually acquired as a consequence of creating the object or via specified ownership assignment. DAC allows the owner to determine who will have access to objects they control. An example of DAC includes user-controlled file permissions.

    When discretionary access control policies are implemented, subjects are not constrained with regard to what actions they can take with information for which they have already been granted access. Thus, subjects that have been granted access to information are not prevented from passing (i.e., the subjects have the discretion to pass) the information to other subjects or objects. A subject that is constrained in its operation by Mandatory Access Control policies is still able to operate under the less rigorous constraints of this requirement. Thus, while Mandatory Access Control imposes constraints preventing a subject from passing information to another subject operating at a different sensitivity level, this requirement permits the subject to pass the information to any subject at the same sensitivity level. The policy is bounded by the information system boundary. Once the information is passed outside the control of the information system, additional means may be required to ensure the constraints remain in effect. While the older, more traditional definitions of discretionary access control require identity-based access control, that limitation is not required for this use of discretionary access control.

    By enabling the fs.protected_hardlinks kernel parameter, users can no longer create soft or hard links to files they do not own. Disallowing such hardlinks mitigate vulnerabilities based on insecure file system accessed by privileged programs, avoiding an exploitation vector exploiting unsafe use of open() or creat().
    		
    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf
    /usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: fs.protected_hardlinks setting in kernel is 1
        criterion_test: oval:rhel.stig:tst:164
      - criterion_comment: fs.protected_hardlinks setting in sysctl configuration files is set to 1, and nothing else, and there are no conflicting settings in other files
        criterion_test: oval:rhel.stig:tst:165
oval:rhel.stig:def:166:
  Version: "1"
  Title: RHEL must restrict access to the kernel message buffer.
  Description: |-
    Preventing unauthorized information transfers mitigates the risk of information, including encrypted representations of information, produced by the actions of prior users/roles (or the actions of processes acting on behalf of prior users/roles) from being available to any current users/roles (or current processes) that obtain access to shared system resources (e.g., registers, main memory, hard disks) after those resources have been released back to information systems. The control of information in shared resources is also commonly referred to as object reuse and residual information protection.

    This requirement generally applies to the design of an information technology product, but it can also apply to the configuration of particular information system components that are, or use, such products. This can be verified by acceptance/validation processes in DoD or other government agencies.

    There may be shared resources with configurable protections (e.g., files in storage) that may be assessed on specific information system components.

    Restricting access to the kernel message buffer limits access to only root. This prevents attackers from gaining additional system information as a non-privileged user.

    The sysctl --system command will load settings from all system configuration files.  All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in.  If multiple files specify the same option, the entry in the file with lexicographically latest name will take precedence.  Files are read from directories in the following list from top to bottom.  Once a file of a gien filename is loaded, any file of the same name in subsequent directories is ignored.  
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf/usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: kernel.dmesg_restrict setting in kernel is 1
        criterion_test: oval:rhel.stig:tst:166
      - criterion_comment: kernel.dmesg_restrict setting in sysctl configuration files is set to 1, and nothing else, and there are no conflicting settings in other files
        criterion_test: oval:rhel.stig:tst:167
oval:rhel.stig:def:168:
  Version: "1"
  Title: RHEL-08-010376 - RHEL 8 must prevent kernel profiling by unprivileged users.
  Description: |-
    Preventing unauthorized information transfers mitigates the risk of information, including encrypted representations of information, produced by the actions of prior users/roles (or the actions of processes acting on behalf of prior users/roles) from being available to any current users/roles (or current processes) that obtain access to shared system resources (e.g., registers, main memory, hard disks) after those resources have been released back to information systems. The control of information in shared resources is also commonly referred to as object reuse and residual information protection.

    This requirement generally applies to the design of an information technology product, but it can also apply to the configuration of particular information system components that are, or use, such products. This can be verified by acceptance/validation processes in DoD or other government agencies.

    There may be shared resources with configurable protections (e.g., files in storage) that may be assessed on specific information system components.
    		
    Setting the kernel.perf_event_paranoid kernel parameter to "2" prevents attackers from gaining additional system information as a non-privileged user.

    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf
    /usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: kernel.perf_event_paranoid setting in kernel is 2
        criterion_test: oval:rhel.stig:tst:168
      - criterion_comment: kernel.perf_event_paranoid setting in sysctl configuration files is set to 2, and nothing else, and there are no conflicting settings in other files
        criterion_test: oval:rhel.stig:tst:169
oval:rhel.stig:def:170:
  Version: "1"
  Title: RHEL must implement address space layout randomization (ASLR) to protect its memory from unauthorized code execution.
  Description: |-
    Some adversaries launch attacks with the intent of executing code in non-executable regions of memory or in memory locations that are prohibited. Security safeguards employed to protect memory include, for example, data execution prevention and address space layout randomization. Data execution prevention safeguards can be either hardware-enforced or software-enforced with hardware providing the greater strength of mechanism.

    Examples of attacks are buffer overflow attacks.

    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf
    /usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:170
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:171
oval:rhel.stig:def:172:
  Version: "1"
  Title: RHEL-08-010671 - RHEL 8 must disable the kernel.core_pattern.
  Description: |-
    It is detrimental for operating systems to provide, or install by default, functionality exceeding requirements or mission objectives. These unnecessary capabilities or services are often overlooked and therefore may remain unsecured. They increase the risk to the platform by providing additional attack vectors.

    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
    /run/sysctl.d/*.conf
    /usr/local/lib/sysctl.d/*.conf
    /usr/lib/sysctl.d/*.conf
    /lib/sysctl.d/*.conf
    /etc/sysctl.conf
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: kernel.core_pattern setting in kernel is '|/bin/false'.
        criterion_test: oval:rhel.stig:tst:172
      - criterion_comment: kernel.core_pattern setting in is set to '|/bin/false', and nothing else, and there are no conflicting settings in other files
        criterion_test: oval:rhel.stig:tst:173
oval:rhel.stig:def:174:
  Version: "1"
  Title: RHEL-08-040210 - RHEL 8 must prevent Internet Control Message Protocol (ICMP) redirect messages from being accepted.
  Description: |-
    ICMP redirect messages are used by routers to inform hosts that a more direct route exists for a particular destination. These messages modify the host's route table and are unauthenticated. An illicit ICMP redirect message could result in a man-in-the-middle attack.

    The sysctl --system command will load settings from all system configuration files. All configuration files are sorted by their filename in lexicographic order, regardless of which of the directories they reside in. If multiple files specify the same option, the entry in the file with the lexicographically latest name will take precedence. Files are read from directories in the following list from top to bottom. Once a file of a given filename is loaded, any file of the same name in subsequent directories is ignored.
    /etc/sysctl.d/*.conf
