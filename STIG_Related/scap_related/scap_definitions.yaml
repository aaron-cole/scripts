            criterion_test: oval:rhel.stig:tst:2601
          - criterion_comment: ""
            criterion_test: oval:rhel.stig:tst:2602
      - criteria:
          criteria_negate: ""
          criteria_operator: OR
          criterion:
          - criterion_comment: ""
            criterion_test: oval:rhel.stig:tst:2601
          - criteria:
              criteria_negate: ""
              criteria_operator: ""
              criterion:
              - criterion_comment: ""
                criterion_test: oval:rhel.stig:tst:2603
              - criterion_comment: ""
                criterion_test: oval:rhel.stig:tst:2604
