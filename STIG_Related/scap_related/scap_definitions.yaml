oval:rhel.stig:def:400:
  Version: "1"
  Title: RHEL-08-040020 - RHEL 8 must cover or disable the built-in or attached camera when not in use.
  Description: Failing to disconnect from collaborative computing devices (i.e., cameras) can result in subsequent compromises of organizational information. Providing easy methods to physically disconnect from such devices after a collaborative computing session helps to ensure participants actually carry out the disconnect activity without having to go through complex and tedious procedures.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: /etc/modprobe.d contains a file that contains 'install uvcvideo /bin/false'
        criterion_test: oval:rhel.stig:tst:400
      - criterion_comment: /etc/modprobe.d contains a file that contains 'blacklist uvcvideo'
        criterion_test: oval:rhel.stig:tst:401
oval:rhel.stig:def:402:
  Version: "1"
  Title: RHEL-08-040021 - RHEL 8 must disable the asynchronous transfer mode (ATM) protocol.
  Description: |-
    It is detrimental for operating systems to provide, or install by default, functionality exceeding requirements or mission objectives. These unnecessary capabilities or services are often overlooked and therefore may remain unsecured. They increase the risk to the platform by providing additional attack vectors.

    Failing to disconnect unused protocols can result in a system compromise.

    The Asynchronous Transfer Mode (ATM) is a protocol operating on network, data link, and physical layers, based on virtual circuits and virtual paths. Disabling ATM protects the system against exploitation of any laws in its implementation.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: /etc/modprobe.d contains a file that contains 'install atm /bin/false'
        criterion_test: oval:rhel.stig:tst:402
      - criterion_comment: /etc/modprobe.d contains a file that contains 'blacklist atm'
        criterion_test: oval:rhel.stig:tst:403
