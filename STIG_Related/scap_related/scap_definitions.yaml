oval:rhel.stig:def:713:
  Version: "1"
  Title: Successful/unsuccessful uses of the su command in RHEL must generate an audit record.
  Description: |-
    Without generating audit records that are specific to the security and mission needs of the organization, it would be difficult to establish, correlate, and investigate the events relating to an incident or identify those responsible for one.

    Audit records can be generated from various components within the information system (e.g., module or policy filter). The "su" command allows a user to run commands with a substitute user and group ID.

    When a user logs on, the AUID is set to the UID of the account that is being authenticated. Daemons are not user sessions and have the loginuid set to "-1". The AUID representation is an unsigned 32-bit integer, which equals "4294967295". The audit system interprets "-1", "4294967295", and "unset" in the same way.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Audit invocations of /usr/bin/su
        criterion_test: oval:rhel.stig:tst:713
oval:rhel.stig:def:714:
  Version: "1"
  Title: RHEL-08-030200 - The RHEL 8 audit system must be configured to audit any usage of the setxattr, fsetxattr, lsetxattr, removexattr, fremovexattr and lremovexattr system calls.
  Description: |-
    Without generating audit records that are specific to the security and mission needs of the organization, it would be difficult to establish, correlate, and investigate the events relating to an incident or identify those responsible for one.

    Audit records can be generated from various components within the information system (e.g., module or policy filter). "Setxattr" is a system call used to set an extended attribute value.
    "Fsetxattr" is a system call used to set an extended attribute value. This is used to set extended attributes on a file.
    "Lsetxattr" is a system call used to set an extended attribute value. This is used to set extended attributes on a symbolic link.
    "Removexattr" is a system call that removes extended attributes.
    "Fremovexattr" is a system call that removes extended attributes. This is used for removal of extended attributes from a file.
    "Lremovexattr" is a system call that removes extended attributes. This is used for removal of extended attributes from symbolic links.

    When a user logs on, the AUID is set to the UID of the account that is being authenticated. Daemons are not user sessions and have the loginuid set to "-1". The AUID representation is an unsigned 32-bit integer, which equals "4294967295". The audit system interprets "-1", "4294967295", and "unset" in the same way.

    The system call rules are loaded into a matching engine that intercepts each syscall that all programs on the system makes. Therefore, it is very important to only use syscall rules when you have to since these affect performance. The more rules, the bigger the performance hit. You can help the performance, though, by combining syscalls into one rule whenever possible.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Audit 32-bit invocations of setxattr syscall
        criterion_test: oval:rhel.stig:tst:734
      - criterion_comment: Audit 64-bit invocations of setxattr syscall
        criterion_test: oval:rhel.stig:tst:735
      - criterion_comment: Audit 32-bit invocations of setxattr syscall by root
        criterion_test: oval:rhel.stig:tst:736
      - criterion_comment: Audit 64-bit invocations of setxattr syscall by root
        criterion_test: oval:rhel.stig:tst:737
      - criterion_comment: Audit 32-bit invocations of fremovexattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:730
      - criterion_comment: Audit 64-bit invocations of fremovexattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:731
      - criterion_comment: Audit 32-bit invocations of fremovexattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:732
      - criterion_comment: Audit 64-bit invocations of fremovexattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:733
      - criterion_comment: Audit 32-bit invocations of fsetxattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:726
      - criterion_comment: Audit 64-bit invocations of fsetxattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:727
      - criterion_comment: Audit 32-bit invocations of fsetxattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:728
      - criterion_comment: Audit 64-bit invocations of fsetxattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:729
      - criterion_comment: Audit 32-bit invocations of lsetxattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:722
      - criterion_comment: Audit 64-bit invocations of lsetxattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:723
      - criterion_comment: Audit 32-bit invocations of lsetxattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:724
      - criterion_comment: Audit 64-bit invocations of lsetxattr syscall (auid=0)
        criterion_test: oval:rhel.stig:tst:725
      - criterion_comment: Audit 32-bit invocations of removexattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:718
      - criterion_comment: Audit 64-bit invocations of removexattr syscall (auid>=1000)
        criterion_test: oval:rhel.stig:tst:719
