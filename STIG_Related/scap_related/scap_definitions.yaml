oval:rhel.stig:def:2806:
  Version: "1"
  Title: RHEL user account passwords must be configured so that existing passwords are restricted to a 60-day maximum lifetime.
  Description: Any password, no matter how complex, can eventually be cracked. Therefore, passwords need to be changed periodically. If RHEL 8 does not limit the lifetime of passwords and force users to change their passwords, there is the risk that RHEL 8 passwords could be compromised.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: No password in /etc/shadow has a maximum password age of 0 or greater than 60
        criterion_test: oval:rhel.stig:tst:2806
      - criterion_comment: Non-system users do not have a blank entry in /etc/shadow for maximum password age
        criterion_test: oval:rhel.stig:tst:2807
      - criterion_comment: Root does not have a blank entry in /etc/shadow for maximum password age
        criterion_test: oval:rhel.stig:tst:2808
oval:rhel.stig:def:2810:
  Version: "1"
  Title: RHEL operating system must not have accounts configured with blank or null passwords.
  Description: If an account has an empty password, anyone could log on and run commands with the privileges of that account. Accounts with empty passwords should never be used in operational environments.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:2810
oval:rhel.stig:def:2850:
  Version: "1"
  Title: RHEL-08-010190 - A sticky bit must be set on all RHEL 8 public directories to prevent unauthorized and unintended information transferred via shared system resources.
  Description: This requirement generally applies to the design of an information technology product, but it can also apply to the configuration of particular information system components that are, or use, such products. This can be verified by acceptance/validation processes in DoD or other government agencies.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: "true"
      criteria_operator: ""
      criterion:
      - criterion_comment: all local world-writable directories have sticky bit set
        criterion_test: oval:rhel.stig:tst:2850
oval:rhel.stig:def:2851:
  Version: "1"
  Title: All RHEL world-writable directories must be owned by root, sys, bin, or an application user.
  Description: ' If a world-writable directory is not owned by root, sys, bin, or an application User Identifier (UID), unauthorized users may be able to modify files created by others.'
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: "true"
      criteria_operator: ""
      criterion:
      - criterion_comment: check for local directories that are world writable and have uid greater than or equal to 1000
        criterion_test: oval:rhel.stig:tst:2851
oval:rhel.stig:def:2852:
  Version: "1"
  Title: All RHEL world-writable directories must be group-owned by root, sys, bin, or an application group.
  Description: If a world-writable directory is not group-owned by root, sys, bin, or an application Group Identifier (GID), unauthorized users may be able to modify files created by others.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: "true"
      criteria_operator: ""
      criterion:
      - criterion_comment: check for local directories that are world writable and have gid greater than or equal to 1000
        criterion_test: oval:rhel.stig:tst:2852
oval:rhel.stig:def:2900:
  Version: "1"
  Title: Local RHEL initialization files must not execute world-writable programs.
  Description: If user start-up files execute world-writable programs, especially in unprotected directories, they could be maliciously modified to destroy user files or otherwise compromise the system at the user level. If the system is compromised at the user level, it is easier to elevate privileges to eventually compromise the system at the root and network level.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: User Initialization Files Must Not Execute World-Writable Programs for local users
        criterion_test: oval:rhel.stig:tst:2900
      - criterion_comment: User Initialization Files Must Not Execute World-Writable Programs in /home/*
        criterion_test: oval:rhel.stig:tst:2901
oval:rhel.stig:def:2903:
  Version: "1"
  Title: Executable search paths within the initialization files of all local interactive RHEL users must only contain paths that resolve to the system default or the users home directory.
  Description: The executable search path (typically the PATH environment variable) contains a list of directories for the shell to search to find executables. If this path includes the current working directory (other than the user's home directory), executables in these directories may be executed instead of system commands. This variable is formatted as a colon-separated list of directories. If there is an empty entry, such as a leading or trailing colon or two consecutive colons, this is interpreted as the current working directory. If deviations from the default system search path for the local interactive user are required, they must be documented with the Information System Security Officer (ISSO).
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: No PATH statments in local initialization files
        criterion_test: oval:rhel.stig:tst:2903
      - criterion_comment: No PATH statments in local initialization files
        criterion_test: oval:rhel.stig:tst:2904
oval:rhel.stig:def:2905:
  Version: "1"
  Title: All RHEL local interactive users must have a home directory assigned in the /etc/passwd file.
  Description: If local interactive users are not assigned a valid home directory, there is no place for the storage and control of files they should own.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: check home dirs
        criterion_test: oval:rhel.stig:tst:2905
oval:rhel.stig:def:2907:
  Version: "1"
  Title: All RHEL local interactive user home directories must have mode 0750 or less permissive.
  Description: Excessive permissions on local interactive user home directories may allow unauthorized access to user files by other users.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: local home dirs
        criterion_test: oval:rhel.stig:tst:2907
      - criterion_comment: /home directories
        criterion_test: oval:rhel.stig:tst:2908
oval:rhel.stig:def:2910:
  Version: "1"
  Title: All RHEL local interactive user home directories must be group-owned by the home directory owner’s primary group.
  Description: If the Group Identifier (GID) of a local interactive user’s home directory is not the same as the primary GID of the user, this would allow unauthorized access to the user’s files, and users that share the same group may not be able to access files that they legitimately should.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: All home directories are group-owned by a local interactive group
        criterion_test: oval:rhel.stig:tst:2910
oval:rhel.stig:def:2911:
  Version: "1"
  Title: RHEL-08-010750 - All RHEL 8 local interactive user home directories defined in the /etc/passwd file must exist.
  Description: If a local interactive user has a home directory defined that does not exist, the user may be given access to the "/" directory as the current working directory upon logon. This could create a denial of service because the user would not be able to access their logon configuration files, and it may give them visibility to system files they normally would not be able to access.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: All Interactive Users Home Directories Must Exist
        criterion_test: oval:rhel.stig:tst:2911
      - criterion_comment: Interactive users don't exist on the system
        criterion_test: oval:rhel.stig:tst:2912
oval:rhel.stig:def:2915:
  Version: "1"
  Title: All RHEL local initialization files must have mode 0740 or less permissive.
  Description: Local initialization files are used to configure the user's shell environment upon logon. Malicious modification of these files could compromise accounts upon logon.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: check initialization files in /home/*
        criterion_test: oval:rhel.stig:tst:2916
      - criterion_comment: check initialization files in local user home dirs
        criterion_test: oval:rhel.stig:tst:2915
oval:rhel.stig:def:2917:
  Version: "1"
  Title: RHEL must set the umask value to 077 for all local interactive user accounts.
  Description: The umask controls the default access mode assigned to newly created files. A umask of 077 limits new files to mode 600 or less permissive. Although umask can be represented as a four-digit number, the first digit representing special access modes is typically ignored or required to be "0". This requirement applies to the globally configured system defaults and the local interactive user defaults for each account on the system.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: users umask equal 077
        criterion_test: oval:rhel.stig:tst:2917
oval:rhel.stig:def:2918:
  Version: "1"
  Title: RHEL local interactive user home directory files must have mode 0750 or less permissive.
  Description: Excessive permissions on local interactive user home directories may allow unauthorized access to user files by other users.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: check directories in /home/*
        criterion_test: oval:rhel.stig:tst:2918
      - criterion_comment: check files in /home/*
        criterion_test: oval:rhel.stig:tst:2919
      - criterion_comment: check directories local user home dirs
        criterion_test: oval:rhel.stig:tst:2920
      - criterion_comment: check files in local user home dirs
        criterion_test: oval:rhel.stig:tst:2921
oval:rhel.stig:def:2922:
  Version: "1"
  Title: RHEL must be configured so that all files and directories contained in local interactive user home directories are group-owned by a group of which the home directory owner is a member.
  Description: If a local interactive user's files are group-owned by a group of which the user is not a member, unintended users may be able to access them.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: All home directories files are group-owned by a local interactive user
        criterion_test: oval:rhel.stig:tst:2922
oval:rhel.stig:def:2923:
  Version: "1"
  Title: RHEL-07-020640 - The Red Hat Enterprise Linux operating system must be configured so that all local interactive user home directories are owned by their respective users.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: All home directories are owned by a local interactive user
        criterion_test: oval:rhel.stig:tst:2923
oval:rhel.stig:def:2924:
  Version: "1"
  Title: RHEL-07-020660 - The Red Hat Enterprise Linux operating system must be configured so that all files and directories contained in local interactive user home directories have a valid owner.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: local home dirs files with no owner
        criterion_test: oval:rhel.stig:tst:2924
      - criterion_comment: local home dirs dirs with no owner
        criterion_test: oval:rhel.stig:tst:2925
oval:rhel.stig:def:2927:
  Version: "1"
  Title: RHEL-07-020690 - The Red Hat Enterprise Linux operating system must be configured so that all local initialization files for interactive users are owned by the home directory user or root.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: check initialization files in local user home dirs for user ownership
        criterion_test: oval:rhel.stig:tst:2927
oval:rhel.stig:def:2928:
  Version: "1"
  Title: RHEL-07-020700 - The Red Hat Enterprise Linux operating system must be configured so that all local initialization files for local interactive users are be group-owned by the users primary group or root.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: check initialization files in local user home dirs for group ownership
        criterion_test: oval:rhel.stig:tst:2928
oval:rhel.stig:def:3000:
  Version: "1"
  Title: RHEL-08-010160 - RHEL 8 operating systems must require authentication upon booting into rescue mode.
  Description: If the system does not require valid root authentication before it boots into rescue mode, anyone who invokes rescue mode is granted privileged access to all files on the system.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: RHEL 8 operating systems require authentication upon booting into rescue mode
        criterion_test: oval:rhel.stig:tst:3000
oval:rhel.stig:def:3001:
  Version: "1"
  Title: RHEL-08-040180 - The debug-shell systemd service must be disabled on RHEL 8.
  Description: The debug-shell requires no authentication and provides root privileges to anyone who has physical access to the machine.  While this feature is disabled by default, masking it adds an additional layer of assurance that it will not be enabled via a dependency in systemd.  This also prevents attackers with physical access from trivially bypassing security on the machine through valid troubleshooting configurations and gaining root access when the system is rebooted.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Disable debug-shell systemd softlink exists
        criterion_test: oval:rhel.stig:tst:3001
oval:rhel.stig:def:3002:
  Version: "1"
  Title: RHEL-08-010152 - RHEL 8 operating systems must require authentication upon booting into emergency mode.
  Description: If the system does not require valid root authentication before it boots into emergency or rescue mode, anyone who invokes emergency or rescue mode is granted privileged access to all files on the system.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Conditions are satisfied
        criterion_test: oval:rhel.stig:tst:3002
oval:rhel.stig:def:3003:
  Version: "1"
  Title: Require authentication upon booting into single-user and maintenance modes.
  Description: The Red Hat Enterprise Linux operating system must require authentication upon booting into single-user and maintenance modes.
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: /usr/sbin/sulogin has been assigned as an option to ExecStart in the /usr/lib/systemd/system/rescue.service file
        criterion_test: oval:rhel.stig:tst:3003
oval:rhel.stig:def:3004:
  Version: "1"
  Title: RHEL must terminate idle user sessions.
  Description: Terminating an idle session within a short time period reduces the window of opportunity for unauthorized personnel to take control of a management session enabled on the console or console port that has been left unattended.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: check /etc/systemd/logind.conf for the StopIdleSessionSec setting
        criterion_test: oval:rhel.stig:tst:3004
oval:rhel.stig:def:3100:
  Version: "1"
  Title: RHEL-08-010300 - RHEL 8 system commands must have mode 755 or less permissive.
  Description: |-
    If RHEL 8 were to allow any user to make changes to software libraries, then those changes might be implemented without undergoing the appropriate testing and approvals that are part of a robust change management process.

    This requirement applies to RHEL 8 with software libraries that are accessible and configurable, as in the case of interpreted languages. Software libraries also include privileged programs that execute with escalated privileges. Only qualified and authorized individuals will be allowed to obtain access to information system components for purposes of initiating changes, including upgrades and modifications.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: System command files have mode 755 or less permissive
        criterion_test: oval:rhel.stig:tst:3100
oval:rhel.stig:def:3102:
  Version: "1"
  Title: RHEL-08-010310 - RHEL 8 system commands must be owned by root.
  Description: |-
    If RHEL 8 were to allow any user to make changes to software libraries, then those changes might be implemented without undergoing the appropriate testing and approvals that are part of a robust change management process.

    This requirement applies to RHEL 8 with software libraries that are accessible and configurable, as in the case of interpreted languages. Software libraries also include privileged programs that execute with escalated privileges. Only qualified and authorized individuals will be allowed to obtain access to information system components for purposes of initiating changes, including upgrades and modifications.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: System command files are owned by root
        criterion_test: oval:rhel.stig:tst:3102
oval:rhel.stig:def:3103:
  Version: "1"
  Title: RHEL-08-010320 - RHEL 8 system commands must be group-owned by root or a system account.
  Description: |-
    If RHEL 8 were to allow any user to make changes to software libraries, then those changes might be implemented without undergoing the appropriate testing and approvals that are part of a robust change management process.

    This requirement applies to RHEL 8 with software libraries that are accessible and configurable, as in the case of interpreted languages. Software libraries also include privileged programs that execute with escalated privileges. Only qualified and authorized individuals will be allowed to obtain access to information system components for purposes of initiating changes, including upgrades and modifications.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: System command files are group-owned by root
        criterion_test: oval:rhel.stig:tst:3103
oval:rhel.stig:def:3104:
  Version: "1"
  Title: All RHEL local files and directories must have a valid owner.
  Description: Unowned files and directories may be unintentionally inherited if a user is assigned the same User Identifier "UID" as the UID of the un-owned files.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Check for files without owners
        criterion_test: oval:rhel.stig:tst:3104
oval:rhel.stig:def:3105:
  Version: "1"
  Title: All RHEL local files and directories must have a valid group owner.
  Description: Files without a valid group owner may be unintentionally inherited if a group is assigned the same Group Identifier (GID) as the GID of the files without a valid group owner.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: check files for group ownership
        criterion_test: oval:rhel.stig:tst:3105
oval:rhel.stig:def:3110:
  Version: "1"
  Title: RHEL-07-010010 - The Red Hat Enterprise Linux operating system must be configured so that the file permissions, ownership, and group membership of system files and commands match the vendor values.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: verify user,group,modes of rpms
        criterion_test: oval:rhel.stig:tst:3110
oval:rhel.stig:def:3113:
  Version: "1"
  Title: Verify user who owns 'cron.allow' file
  Description: |-
    The /etc/cron.allow file should be owned by the
          appropriate user.
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Check file ownership of /etc/cron.allow
        criterion_test: oval:rhel.stig:tst:3113
oval:rhel.stig:def:3114:
  Version: "1"
  Title: Verify group who owns 'cron.allow' file
  Description: |-
    The /etc/cron.allow file should be owned by the appropriate
          group.
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:3114
oval:rhel.stig:def:3115:
  Version: "1"
  Title: RHEL-07-040160 - The Red Hat Enterprise Linux operating system must be configured so that all network connections associated with a communication session are terminated at the end of the session or after 15 minutes of inactivity from the user at a command prompt, except to fulfill documented and validated mission requirements.
  Description: |-
    Terminating an idle session within a short time period reduces the window of opportunity for unauthorized personnel to take control of a management session enabled on the console or console port that has been left unattended. In addition, quickly terminating an idle session will also free up resources committed by the managed network element. 

    Terminating network connections associated with communications sessions includes, for example, de-allocating associated TCP/IP address/port pairs at the operating system level and de-allocating networking assignments at the application level if multiple application sessions are using a single operating system-level network connection. This does not mean that the operating system terminates all sessions or network access; it only ends the inactive session and releases the resources associated with that session.
  Platforms: multi_platform_rhel
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: declare -xr TMOUT value in /etc/profile.d/*.sh <= 900
        criterion_test: oval:rhel.stig:tst:3115
oval:rhel.stig:def:3116:
  Version: "1"
  Title: SNMP default communities disabled
  Description: SNMP default communities must be removed.
  Platforms: multi_platform_all
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: package net-snmp is removed
        criterion_test: oval:rhel.stig:tst:3116
      - criterion_comment: SNMP communities
        criterion_test: oval:rhel.stig:tst:3117
oval:rhel.stig:def:3118:
  Version: "1"
  Title: RHEL-07-040820 - The Red Hat Enterprise Linux operating system must not have unauthorized IP tunnels configured.
  Description: description_replaceme
  Platforms: Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: libreswan not installed
        criterion_test: oval:rhel.stig:tst:3118
      - criteria:
          criteria_negate: ""
          criteria_operator: AND
          criterion:
          - criterion_comment: ipsec is not running
            criterion_test: oval:rhel.stig:tst:3119
          - criterion_comment: Property UnitFileState of service ipsec is disabled
            criterion_test: oval:rhel.stig:tst:3120
oval:rhel.stig:def:3121:
  Version: "1"
  Title: Verify File Hashes with RPM
  Description: Verify the RPM digests of system binaries using the RPM database.
  Platforms: multi_platform_fedora,multi_platform_rhel
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: verify file md5 hashes
        criterion_test: oval:rhel.stig:tst:3121
oval:rhel.stig:def:3200:
  Version: "1"
  Title: RHEL-08-020000 - RHEL 8 temporary user accounts must be provisioned with an expiration time of 72 hours or less.
  Description: ' If temporary user accounts remain active when no longer needed or for an excessive period, these accounts may be used to gain unauthorized access. To mitigate this risk, automated termination of all temporary accounts must be set upon account creation.'
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: get /etc/passwd contents
        criterion_test: oval:rhel.stig:tst:3200
oval:rhel.stig:def:3201:
  Version: "1"
  Title: RHEL-08-020240 - RHEL 8 duplicate User IDs (UIDs) must not exist for interactive users.
  Description: To ensure accountability and prevent unauthenticated access, interactive users must be identified and authenticated to prevent potential misuse and compromise of the system.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:3201
oval:rhel.stig:def:3204:
  Version: "1"
  Title: RHEL account identifiers (individuals, groups, roles, and devices) must be disabled after 35 days of inactivity.
  Description: |-
    Inactive identifiers pose a risk to systems and applications because attackers may exploit an inactive identifier and potentially obtain undetected access to the system. Owners of inactive accounts will not notice if unauthorized access to their user account has been obtained.

    RHEL 8 needs to track periods of inactivity and disable application identifiers after 35 days of inactivity.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:3204
oval:rhel.stig:def:3205:
  Version: "1"
  Title: RHEL emergency accounts must be automatically removed or disabled after the crisis is resolved or within 72 hours.
  Description: Emergency accounts are privileged accounts established in response to crisis situations where the need for rapid account activation is required. Therefore, emergency account activation may bypass normal account authorization processes. If these accounts are automatically disabled, system maintenance during emergencies may not be possible, thus adversely affecting system availability.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
