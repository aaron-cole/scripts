      - criterion_comment: package rng-tools is installed
        criterion_test: oval:rhel.stig:tst:1952
oval:rhel.stig:def:2000:
  Version: "1"
  Title: RHEL-08-010010 - RHEL 8 vendor packaged system security patches and updates must be installed and up to date.
  Description: Timely patching is critical for maintaining the operational availability, confidentiality, and integrity of information technology (IT) systems. However, failure to keep operating system and application software patched is a common mistake made by IT professionals. New patches are released daily, and it is often difficult for even experienced System Administrators to keep abreast of all the new patches. When new weaknesses in an operating system exist, patches are usually made available by the vendor to resolve the problems. If the most recent security patches and updates are not installed, unauthorized users may take advantage of weaknesses in the unpatched software. The lack of prompt attention to patching could result in a system compromise.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: check modified of dnf history
        criterion_test: oval:rhel.stig:tst:2000
oval:rhel.stig:def:2002:
  Version: "1"
  Title: RHEL-08-010370 - RHEL 8 must prevent the installation of software, patches, service packs, device drivers, or operating system components from a repository without verification they have been digitally signed using a certificate that is issued by a Certificate Authority (CA) that is recognized and approved by the organization.
  Description: |-
    Changes to any software components can have significant effects on the overall security of the operating system. This requirement ensures the software has not been tampered with and that it has been provided by a trusted vendor.

    Accordingly, patches, service packs, device drivers, or operating system components must be signed with a certificate recognized and approved by the organization.

    Verifying the authenticity of the software prior to installation validates the integrity of the patch or upgrade received from a vendor. This verifies the software has not been tampered with and that it has been provided by a trusted vendor. Self-signed certificates are disallowed by this requirement. The operating system should not have to verify the software again. This requirement does not mandate DoD certificates for this purpose; however, the certificate used to verify the software must be from an approved CA.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Every /etc/yum.repos.d/*.repo:[{reponame}] has a gpgcheck entry set to 1.
        criterion_test: oval:rhel.stig:tst:2002
      - criterion_comment: No /etc/yum.repos.d/*.repo:[{reponame}] has a gpgcheck entry set to 0.
        criterion_test: oval:rhel.stig:tst:2003
