oval:rhel.stig:def:2300:
  Version: "1"
  Title: The RHEL operating system must implement the Endpoint Security for Linux Threat Prevention tool.
  Description: Adding endpoint security tools can provide the capability to automatically take actions in response to malicious behavior, which can provide additional agility in reacting to network threats. These tools also often include a reporting capability to provide network awareness of the system, which may not otherwise exist in an organization's systems management regime.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
