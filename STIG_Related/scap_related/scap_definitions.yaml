  Description: When the kernel invokes systemd-coredumpt to handle a core dump, it runs in privileged mode, and will connect to the socket created by the systemd-coredump.socket unit. This, in turn,  will spawn an unprivileged systemd-coredump@.service instance to process the core dump.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: systemd-coredump.socket is not running
        criterion_test: oval:rhel.stig:tst:2502
      - criterion_comment: Property LoadState of service systemd-coredump.socket is masked
        criterion_test: oval:rhel.stig:tst:2503
oval:rhel.stig:def:2504:
  Version: "1"
  Title: RHEL-08-010674 - RHEL 8 must disable storing core dumps.
  Description: |-
    It is detrimental for operating systems to provide, or install by default, functionality exceeding requirements or mission objectives. These unnecessary capabilities or services are often overlooked and therefore may remain unsecured. They increase the risk to the platform by providing additional attack vectors.

    A core dump includes a memory image taken at the time the operating system terminates an application. The memory image could contain sensitive data and is generally useful only for developers trying to debug problems.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
