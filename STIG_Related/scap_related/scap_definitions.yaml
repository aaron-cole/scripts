  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: sshd_config X11UseLocalhost is set to 'yes'.
        criterion_test: oval:rhel.stig:tst:1522
