        criterion_test: oval:rhel.stig:tst:2301
      - criterion_comment: mfetpd running
        criterion_test: oval:rhel.stig:tst:2302
oval:rhel.stig:def:2350:
  Version: "1"
  Title: RHEL-08-010673 - RHEL 8 must disable core dumps for all users.
  Description: |-
    It is detrimental for operating systems to provide, or install by default, functionality exceeding requirements or mission objectives. These unnecessary capabilities or services are often overlooked and therefore may remain unsecured. They increase the risk to the platform by providing additional attack vectors.

    A core dump includes a memory image taken at the time the operating system terminates an application. The memory image could contain sensitive data and is generally useful only for developers trying to debug problems.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:2350
      - criterion_comment: ""
        criterion_test: oval:rhel.stig:tst:2353
oval:rhel.stig:def:2356:
  Version: "1"
  Title: RHEL must limit the number of concurrent sessions to ten for all accounts and/or account types.
  Description: |-
    Operating system management includes the ability to control the number of users and user sessions that utilize an operating system. Limiting the number of allowed users and sessions per user is helpful in reducing the risks related to DoS attacks.

    This requirement addresses concurrent sessions for information system accounts and does not address concurrent sessions by single users via multiple system accounts. The maximum number of concurrent sessions should be defined based on mission needs and the operational environment for each system.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: limits.conf:maxlogins is set to 10 or less by default
        criterion_test: oval:rhel.stig:tst:2356
      - criterion_comment: limits.conf:maxlogins is set to 10 or less for non-default domains
        criterion_test: oval:rhel.stig:tst:2359
oval:rhel.stig:def:2400:
  Version: "1"
  Title: RHEL-08-010160 - The RHEL 8 pam_unix.so module must be configured in the password-auth file to use a FIPS 140-2 approved cryptographic hashing algorithm for system authentication.
  Description: |-
    Unapproved mechanisms that are used for authentication to the cryptographic module are not verified and therefore cannot be relied upon to provide confidentiality or integrity, and DoD data may be compromised.

    RHEL 8 systems utilizing encryption are required to use FIPS-compliant mechanisms for authenticating to cryptographic modules. 

    FIPS 140-2 is the current standard for validating that mechanisms used to access cryptographic modules utilize authentication that meets DoD requirements. This allows for Security Levels 1, 2, 3, or 4 for use on a general-purpose computing system.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: Check the file /etc/pam.d/password-auth to see if the password section for pam_unix.so sets the cryptographic hashing algorithm to sha512.
        criterion_test: oval:rhel.stig:tst:2400
oval:rhel.stig:def:2401:
  Version: "1"
  Title: RHEL-08-020010 - RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur.
  Description: |-
    By limiting the number of failed logon attempts, the risk of unauthorized system access via user password guessing, otherwise known as brute-force attacks, is reduced. Limits are imposed by locking the account.

    RHEL 8 can utilize the "pam_faillock.so" for this purpose. Note that manual changes to the listed files may be overwritten by the "authselect" program.

    From "Pam_Faillock" man pages: Note that the default directory that "pam_faillock" uses is usually cleared on system boot so the access will be also re-enabled after system reboot. If that is undesirable a different tally directory must be set with the "dir" option.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: AND
      criterion:
      - criterion_comment: pam_faillock.so authfail line exists in system-auth
        criterion_test: oval:rhel.stig:tst:2401
      - criterion_comment: pam_faillock.so preauth deny value set in system-auth
        criterion_test: oval:rhel.stig:tst:2403
      - criterion_comment: account required pam_faillock.so exists in system-auth
        criterion_test: oval:rhel.stig:tst:2405
      - criterion_comment: pam_faillock.so authfail exists in password-auth
        criterion_test: oval:rhel.stig:tst:2402
      - criterion_comment: pam_faillock.so preauth deny value set in password-auth
        criterion_test: oval:rhel.stig:tst:2404
      - criterion_comment: account required pam_faillock.so exists in password-auth
        criterion_test: oval:rhel.stig:tst:2406
oval:rhel.stig:def:2407:
  Version: "1"
  Title: RHEL-08-020011 - RHEL 8 must automatically lock an account when three unsuccessful logon attempts occur.
  Description: |-
    In RHEL 8.2 the "/etc/security/faillock.conf" file was incorporated to centralize the configuration of the pam_faillock.so module.  Also introduced is a "local_users_only" option that will only track failed user authentication attempts for local users in /etc/passwd and ignore centralized (AD, IdM, LDAP, etc.) users to allow the centralized platform to solely manage user lockout.

    From "faillock.conf" man pages: Note that the default directory that "pam_faillock" uses is usually cleared on system boot so the access will be also re-enabled after system reboot. If that is undesirable a different tally directory must be set with the "dir" option.
  Platforms: Red Hat Enterprise Linux 8
