oval:rhel.stig:def:1502:
  Version: "1"
  Title: RHEL-08-010200 - RHEL 8 must be configured so that all network connections associated with SSH traffic are terminated at the end of the session or after 10 minutes of inactivity, except to fulfill documented and validated mission requirements.
  Description: |-
    Terminating an idle SSH session within a short time period reduces the window of opportunity for unauthorized personnel to take control of a management session enabled on the console or console port that has been left unattended. In addition, quickly terminating an idle SSH session will also free up resources committed by the managed network element.

    Terminating network connections associated with communications sessions includes, for example, de-allocating associated TCP/IP address/port pairs at the operating system level and de-allocating networking assignments at the application level if multiple application sessions are using a single operating system-level network connection. This does not mean that the operating system terminates all sessions or network access; it only ends the inactive session and releases the resources associated with that session.

    RHEL 8 utilizes /etc/ssh/sshd_config for configurations of OpenSSH. Within the sshd_config the product of the values of "ClientAliveInterval" and "ClientAliveCountMax" are used to establish the inactivity threshold. The "ClientAliveInterval" is a timeout interval in seconds after which if no data has been received from the client, sshd will send a message through the encrypted channel to request a response from the client. The "ClientAliveCountMax" is the number of client alive messages that may be sent without sshd receiving any messages back from the client. If this threshold is met, sshd will disconnect the client.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: /etc/ssh/sshd_config:ClientAliveCountMax = 1.
        criterion_test: oval:rhel.stig:tst:1502
oval:rhel.stig:def:1503:
  Version: "1"
  Title: RHEL-08-010290 - The RHEL 8 SSH server must be configured to use only Message Authentication Codes (MACs) employing FIPS 140-2 validated cryptographic hash algorithms.
  Description: Without cryptographic integrity protections, information can be altered by unauthorized users without detection.
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: Check that /etc/crypto-policies/back-ends/opensshserver.config contains FIPS-approved SSHD MACs
        criterion_test: oval:rhel.stig:tst:1503
      - criterion_comment: Check that /etc/crypto-policies/back-ends/opensshserver.config contains FIPS-approved SSHD MACs
        criterion_test: oval:rhel.stig:tst:1537
