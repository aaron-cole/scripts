oval:rhel.stig:def:250:
  Version: "1"
  Title: RHEL operating systems booted with United Extensible Firmware Interface (UEFI) implemented must require authentication upon booting into single-user mode and maintenance.
  Description: If the system does not require valid authentication before it boots into single-user or maintenance mode, anyone who invokes single-user or maintenance mode is granted privileged access to all files on the system. GRUB 2 is the default boot loader for RHEL 8 and is designed to require a password to boot into single-user mode or make modifications to the boot menu.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: /boot/efi/EFI/redhat/grub.cfg exists.
        criterion_test: oval:rhel.stig:tst:252
      - criteria:
          criteria_negate: ""
          criteria_operator: ""
          criterion:
          - criterion_comment: /boot/efi/EFI/redhat/grub.cfg:superusers exists and has a name.
            criterion_test: oval:rhel.stig:tst:250
          - criterion_comment: /boot/efi/EFI/redhat/user.cfg:GRUB2_PASSWORD exists and has a PBKDF2/SHA512 password assigned.
            criterion_test: oval:rhel.stig:tst:251
oval:rhel.stig:def:253:
  Version: "1"
  Title: RHEL operating systems booted with United Extensible Firmware Interface (UEFI) must require a unique superusers name upon booting into single-user mode and maintenance.
  Description: The GRUB 2 superuser account is an account of last resort. Establishing a unique username for this account hardens the boot loader against brute force attacks. Due to the nature of the superuser account database being distinct from the OS account database, this allows the use of a username that is not among those within the OS account database. Examples of non-unique superusers names are root, superuser, unlock, etc.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: Superuser is defined in /boot/efi/EFI/redhat/grub.cfg and it isn't root, admin, administrator nor equal to any system username
        criterion_test: oval:rhel.stig:tst:253
