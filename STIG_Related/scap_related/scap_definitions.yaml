  Version: "1"
  Title: RHEL-08-010000 - RHEL 8 must be a vendor-supported release.
  Description: |-
    An operating system release is considered "supported" if the vendor continues to provide security patches for the product. With an unsupported release, it will not be possible to resolve security issues discovered in the system software.

    Red Hat offers the Extended Update Support (EUS) ad-on to a Red Hat Enterprise Linux subscription, for a fee, for those customers who wish to standardize on a specific minor release for an extended period. The RHEL 8 minor releases eligible for EUS are 8.1, 8.2, 8.4, 8.6, and 8.8. Each RHEL 8 EUS stream is available for 24 months from the availability of the minor release. RHEL 8.10 will be the final minor release ovaerall. For more details on the Red Hat Enterprise Linux Life Cycle please visit https://access.redhat.com/support/policy/updates/errata.
  Platforms: RHEL 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: OR
      criterion:
      - criterion_comment: The RHEL 8 minor version is supported.
        criterion_test: oval:rhel.stig:tst:2250
