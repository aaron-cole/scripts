  Version: "1"
  Title: RHEL-08-020100 - RHEL 8 must ensure the password complexity module is enabled in the password-auth file.
  Description: |-
    Use of a complex password helps to increase the time and resources required to compromise the password. Password complexity, or strength, is a measure of the effectiveness of a password in resisting attempts at guessing and brute-force attacks. "pwquality" enforces complex password construction configuration and has the ability to limit brute-force attacks on the system.

    RHEL 8 utilizes "pwquality" as a mechanism to enforce password complexity. This is set in both:
    /etc/pam.d/password-auth
    /etc/pam.d/system-auth
  Platforms: Red Hat Enterprise Linux 8
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: The pam_pwquality module is included in password-auth.
        criterion_test: oval:rhel.stig:tst:2430
