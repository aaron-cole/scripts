oval:rhel.stig:def:601:
  Version: "1"
  Title: ' RHEL audit records must contain information to establish what type of events occurred, the source of events, where events occurred, and the outcome of events.'
  Description: |-
    Without establishing what type of events occurred, the source of events, where events occurred, and the outcome of events, it would be difficult to establish, correlate, and investigate the events leading up to an outage or attack.

    Audit record content that may be necessary to satisfy this requirement includes, for example, time stamps, source and destination addresses, user/process identifiers, event descriptions, success/fail indications, filenames involved, and access control or flow control rules invoked.

    Associating event types with detected events in RHEL 8 audit logs provides a means of investigating an attack, recognizing resource utilization or capacity thresholds, or identifying an improperly configured RHEL system.
  Platforms: Red Hat Enterprise Linux 8,Red Hat Enterprise Linux 7
  criteria:
  - criteria:
      criteria_negate: ""
      criteria_operator: ""
      criterion:
      - criterion_comment: auditd enabled
        criterion_test: oval:rhel.stig:tst:602
      - criterion_comment: auditd running
        criterion_test: oval:rhel.stig:tst:603
      - criterion_comment: check for running auditd
        criterion_test: oval:rhel.stig:tst:601
oval:rhel.stig:def:610:
  Version: "1"
  Title: The RHEL System Administrator (SA) and Information System Security Officer (ISSO) (at a minimum) must be alerted of an audit processing failure event.
  Description: |-
    It is critical for the appropriate personnel to be aware if a system is at risk of failing to process audit logs as required. Without this notification, the security personnel may be unaware of an impending failure of the audit capability, and system operation may be adversely affected.

    Audit processing failures include software/hardware errors, failures in the audit capturing mechanisms, and audit storage capacity being reached or exceeded.

    This requirement applies to each audit data storage repository (i.e., distinct information system component where audit records are stored), the centralized audit storage capacity of organizations (i.e., all audit data storage repositories combined), or both.
